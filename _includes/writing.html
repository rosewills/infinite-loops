<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold border-bottom pb-3 mb-5">Writing</h3>
    {% if page.title == "Home" %}
      {% for item in site.data.writing.featured %}
        <p><a href="{{ item.url }}">{{ item.name }}</a></p>
      {% endfor %}
    {% else %}
      <h3 class="fw-bold border-bottom pb-3 mb-5">Science Communication</h3>
      {% for item in site.data.writing.scicom %}
        <p><a href="{{ item.url }}">{{ item.name }}</a></p>
      {% endfor %}
    {% endif %}
  </div>
</div>
