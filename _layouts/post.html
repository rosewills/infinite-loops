---
layout: default
---

<div class="row g-5 mb-5">
	<div class="col-md-12">
		<!-- <img class="cover" src="{{ site.baseurl }}/assets/images/posts/{{ page.cover }}" alt="{{ page.cover-alt }}"/> -->
		<div class="post-header {% if page.cover %}has-cover{% endif %}" {% if page.cover %}style="background-image: linear-gradient(to bottom, transparent, #ffffff), url({{ site.baseurl }}/assets/images/posts/{{ page.cover }});"{% endif %}>
			<div class="post-title">{{ page.title }}</div> <!-- fw-bold border-bottom pb-3 mb-5 -->
			{% if page.subtitle %}<div class="post-title sub">{{ page.subtitle }}</div>{% endif %}
			<div class="meta-section">
				<div class="post-meta left">
					by <strong>{{ page.author }}</strong>
				</div>
				<div class="post-meta middle">
				</div>
				<div class="post-meta right">
					{{ page.date | date: "%B %-d, %Y" }}
					<!-- <div class="post-categories">
						{% if page.categories.size > 0 %}in {% for cat in page.categories %}
						{% if site.jekyll-archives %}
						<a href="{{ site.baseurl }}/category/{{ cat }}">{{ cat | capitalize }}</a>{% if forloop.last == false %}, {% endif %}
						{% else %}
						<a href="{{ site.baseurl }}/posts/#{{ cat }}">{{ cat | capitalize }}</a>{% if forloop.last == false %}, {% endif %}
						{% endif %}
						{% endfor %}{% endif %}
					</div> -->
				</div>
			</div>
		</div>
		{{ content }}
	</div>
</div>
