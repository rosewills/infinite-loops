---
layout: default
---

<div class="row g-5 mb-5">
	<div class="col-md-6">
		{{ content }}
	</div>
	<div class="col-md-6">
		<img src="{{ site.baseurl }}/assets/images/oreo-teddy.jpg" alt="Home" width="50%">
	</div>
</div>

<div class="row g-5 mb-5">
	<div class="col-md-12">
		<section class="mt-4 mb-5">		
			<div class="container-fluid">	
				<div class="title mini">Recent Work</div>
				<div class="card-columns">        
					{% for post in paginator.posts  limit:3 %}
						{% include card-post.html %}
					{% endfor %}            
				</div>
			</div>    
		</section>
	</div>
</div>
